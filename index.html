<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>وصفاتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8ED;
    --card:#FFFFFF;
    --ink:#2D2A26;
    --ink-soft:#8A7F6F;
    --coral:#E8562F;
    --coral-dark:#C43D1A;
    --gold:#FFB100;
    --teal:#12A594;
    --teal-dark:#0C7A6E;
    --pink:#D64550;
    --line:#F0DFC8;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(232,86,47,0.06) 1px, transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    background:linear-gradient(120deg, var(--coral) 0%, var(--coral-dark) 55%, var(--gold) 130%);
    color:#fff;
    padding:24px 18px 30px;
    border-bottom:5px solid var(--gold);
    box-shadow:0 4px 16px rgba(196,61,26,0.25);
  }
  header h1{
    font-family:'Markazi Text',serif;
    font-size:2.5rem;
    font-weight:700;
    margin:0 0 4px;
    text-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  header p{margin:0; font-size:0.88rem; opacity:0.9;}
  .container{max-width:760px; margin:0 auto; padding:16px;}

  .toolbar{display:flex; gap:8px; margin:14px 0; flex-wrap:wrap;}
  .toolbar input[type=text], .toolbar select{
    font-family:'Tajawal',sans-serif;
    border:1.5px solid var(--line);
    background:var(--card);
    border-radius:12px;
    padding:10px 12px;
    font-size:0.92rem;
    color:var(--ink);
  }
  .toolbar input[type=text]{flex:1 1 160px;}
  .toolbar select{flex:0 1 140px;}
  .btn{
    border:none; border-radius:12px; padding:10px 18px;
    font-family:'Tajawal',sans-serif; font-weight:700; font-size:0.92rem;
    cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:linear-gradient(120deg, var(--gold), var(--coral)); color:#fff; box-shadow:0 3px 10px rgba(232,86,47,0.3);}
  .btn-teal{background:linear-gradient(120deg, var(--teal), var(--teal-dark)); color:#fff; box-shadow:0 3px 10px rgba(18,165,148,0.3);}
  .btn-ghost{background:#fff; color:var(--coral-dark); border:1.5px solid var(--coral); }
  .btn-danger{background:#fff; color:var(--pink); border:1.5px solid var(--pink);}
  .btn-small{padding:7px 12px; font-size:0.78rem; border-radius:9px;}
  .row-actions{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:16px; margin-top:10px;}
  .card{
    background:var(--card); border-radius:var(--radius); border:1.5px solid var(--line);
    position:relative; overflow:hidden; box-shadow:0 3px 10px rgba(45,42,38,0.06);
    display:flex; flex-direction:column; transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 8px 18px rgba(45,42,38,0.12);}
  .card-top{height:6px; background:linear-gradient(90deg, var(--coral), var(--gold), var(--teal));}
  .card-img{width:100%; height:140px; object-fit:cover; background:var(--paper); display:block;}
  .card-img-placeholder{width:100%; height:140px; display:flex; align-items:center; justify-content:center; background:var(--paper); color:var(--line); font-size:2.2rem;}
  .card-body{padding:12px 14px 14px; flex:1; display:flex; flex-direction:column;}
  .card-tag{display:inline-block; align-self:flex-start; background:var(--teal); color:#fff; font-size:0.7rem; padding:4px 10px; border-radius:20px; margin-bottom:8px; font-weight:700;}
  .card h3{font-family:'Markazi Text',serif; font-size:1.45rem; margin:0 0 6px; font-weight:700; color:var(--coral-dark);}
  .card-fav{
    position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.92); border-radius:50%;
    width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    border:1.5px solid var(--line); cursor:pointer; font-size:1.2rem; color:var(--line); z-index:2;
  }
  .card-fav.active{color:var(--gold); border-color:var(--gold); box-shadow:0 2px 8px rgba(255,177,0,0.4);}
  .card-check{
    position:absolute; top:10px; right:10px; width:26px; height:26px; z-index:2;
    accent-color:var(--pink); display:none; cursor:pointer;
  }
  .grid.selecting .card-check{display:block;}
  .grid.selecting .card{outline:2px solid transparent;}
  .grid.selecting .card.checked{outline:2px solid var(--pink);}
  .card-actions{display:flex; gap:8px; margin-top:auto; padding-top:10px;}
  .card-actions .btn{flex:1;}

  .empty{text-align:center; padding:50px 20px; color:var(--ink-soft);}
  .empty .big{font-size:2.4rem; margin-bottom:8px;}

  .overlay{
    position:fixed; inset:0; background:rgba(45,30,20,0.55);
    display:none; align-items:flex-start; justify-content:center;
    padding:24px 12px; overflow-y:auto; z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--card); border-radius:20px; max-width:520px; width:100%;
    padding:22px; border:1.5px solid var(--line); margin-top:10px;
    box-shadow:0 12px 30px rgba(45,30,20,0.25);
  }
  .modal h2{font-family:'Markazi Text',serif; font-size:1.8rem; margin:0 0 14px; color:var(--coral-dark);}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:0.82rem; font-weight:700; color:var(--teal-dark); margin-bottom:5px;}
  .field input[type=text], .field input[type=url], .field input[type=number], .field textarea, .field select{
    width:100%; font-family:'Tajawal',sans-serif; border:1.5px solid var(--line); border-radius:12px;
    padding:10px 12px; font-size:0.92rem; background:#fff; color:var(--ink); resize:vertical;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--gold); border-color:var(--gold);}
  .field textarea{min-height:70px; line-height:1.6;}
  .cat-row{display:flex; gap:8px;}
  .cat-row select{flex:1;}
  .img-pick{display:flex; align-items:center; gap:12px;}
  .img-pick img{width:64px; height:64px; object-fit:cover; border-radius:10px; border:1.5px solid var(--line);}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .modal-actions .btn{flex:1;}
  .hint{font-size:0.72rem; color:var(--ink-soft); margin-top:4px;}
  .link-line{display:flex; align-items:center; gap:6px; font-size:0.85rem; color:var(--coral-dark); margin-top:8px; text-decoration:none; font-weight:700;}
  .fab{
    position:fixed; bottom:20px; left:20px; background:linear-gradient(135deg, var(--gold), var(--coral)); color:#fff;
    width:58px; height:58px; border-radius:50%; border:none; font-size:1.9rem;
    box-shadow:0 6px 18px rgba(196,61,26,0.4); cursor:pointer; z-index:20;
  }

  /* ingredients table */
  .ing-head{display:grid; grid-template-columns:1fr 70px 120px 30px; gap:6px; font-size:0.72rem; color:var(--ink-soft); margin-bottom:4px; padding:0 2px; font-weight:700;}
  .ing-row{display:grid; grid-template-columns:1fr 70px 120px 30px; gap:6px; margin-bottom:6px; align-items:center;}
  .ing-row input, .ing-row select{padding:8px 8px; font-size:0.85rem;}
  .remove-x{
    background:#fff; border:1.5px solid var(--pink); color:var(--pink); font-size:1rem; cursor:pointer;
    width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center;
  }

  /* method groups */
  .method-group{
    border:1.5px dashed var(--teal); border-radius:14px; padding:12px; margin-bottom:12px; background:#FAFFFE;
  }
  .method-group-head{display:flex; gap:8px; align-items:center; margin-bottom:10px;}
  .method-group-head input{flex:1; font-weight:700;}
  .step-row{display:flex; gap:6px; margin-bottom:6px; align-items:center;}
  .step-row .step-num{
    width:24px; height:24px; border-radius:50%; background:var(--teal); color:#fff;
    font-size:0.75rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700;
  }
  .step-row input{flex:1; padding:8px 10px; font-size:0.85rem;}
  .add-step-btn{margin-top:2px;}

  .view-section{margin-bottom:16px;}
  .view-section h4{font-family:'Markazi Text',serif; color:var(--coral-dark); font-size:1.2rem; margin:0 0 6px; border-bottom:2px solid var(--gold); padding-bottom:4px;}
  .view-table{width:100%; border-collapse:collapse; font-size:0.9rem;}
  .view-table td{padding:6px 4px; border-bottom:1px solid var(--line);}
  .view-steps{padding-inline-start:20px; line-height:1.9;}
  .view-group-title{font-weight:700; color:var(--teal-dark); margin:10px 0 4px;}
  .view-body{white-space:pre-wrap; line-height:1.8; font-size:0.92rem;}

  @media (max-width:420px){
    header h1{font-size:2rem;}
    .grid{grid-template-columns:1fr 1fr;}
    .ing-head{display:none;}
    .ing-row{grid-template-columns:1fr 55px 95px 26px;}
  }
</style>
</head>
<body>

<header>
  <div class="container" style="padding:0;">
    <h1>وصفاتي 🍲</h1>
    <p>دفتر وصفاتك المفضّلة، محفوظ على جهازك</p>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="ابحثي عن وصفة أو مكوّن...">
    <select id="categoryFilter"><option value="">جميع الأصناف</option></select>
    <select id="favFilter">
      <option value="">الكل</option>
      <option value="fav">المفضّلة فقط ⭐</option>
    </select>
  </div>
  <div class="row-actions">
    <button class="btn btn-ghost btn-small" id="exportBtn">تصدير JSON</button>
    <button class="btn btn-ghost btn-small" id="importBtn">استيراد JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
    <button class="btn btn-danger btn-small" id="selectModeBtn">تحديد وحذف وصفات</button>
  </div>
  <div class="row-actions" id="bulkActions" style="display:none;">
    <button class="btn btn-danger btn-small" id="deleteSelectedBtn">حذف المحدّد (<span id="selCount">0</span>)</button>
    <button class="btn btn-ghost btn-small" id="cancelSelectBtn">إلغاء التحديد</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <div class="big">📖</div>
    <div>لا توجد وصفات بعد. اضغطي على زر الإضافة لتسجيل أول وصفة</div>
  </div>
</div>

<button class="fab" id="addBtn" title="إضافة وصفة">+</button>

<!-- Add/Edit Modal -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <h2 id="formTitle">وصفة جديدة</h2>
    <input type="hidden" id="editId">

    <div class="field">
      <label>اسم الوصفة</label>
      <input type="text" id="fName" placeholder="مثال: مقلوبة الدجاج">
    </div>

    <div class="field">
      <label>التصنيف</label>
      <div class="cat-row">
        <select id="fCategory"></select>
        <button type="button" class="btn btn-teal btn-small" id="addCatBtn">＋ تصنيف جديد</button>
      </div>
    </div>

    <div class="field">
      <label>صورة الوصفة (اختياري)</label>
      <div class="img-pick">
        <img id="imgPreview" src="" style="display:none;">
        <input type="file" id="fImage" accept="image/*">
      </div>
      <div class="hint">سيتم ضغط الصورة تلقائياً قبل حفظها</div>
    </div>

    <div class="field">
      <label>المكوّنات</label>
      <div class="ing-head">
        <span>المكوّن</span><span>الكمية</span><span>الوحدة</span><span></span>
      </div>
      <div id="ingredientsBody"></div>
      <button type="button" class="btn btn-teal btn-small" id="addIngBtn">＋ إضافة مكوّن</button>
    </div>

    <div class="field">
      <label>طريقة الإعداد (مراحل)</label>
      <div id="methodGroups"></div>
      <button type="button" class="btn btn-teal btn-small" id="addGroupBtn">＋ إضافة مرحلة جديدة</button>
      <div class="hint">على سبيل المثال: مرحلة "تجهيز المكوّنات الجافة" ثم خطواتها، تليها مرحلة "الخَبز" وهكذا</div>
    </div>

    <div class="field">
      <label>رابط (فيديو أو موقع) - اختياري</label>
      <input type="url" id="fLink" placeholder="https://...">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="overlay" id="viewOverlay">
  <div class="modal" id="viewModalBody"></div>
</div>

<script>
const STORAGE_KEY = 'wasfati_recipes';
const CATS_KEY = 'wasfati_categories';
const UNITS = ['غرام','كيلوغرام','ملعقة صغيرة','ملعقة كبيرة','كوب','مل','لتر','حبة','رشة','حسب الرغبة'];
const DEFAULT_CATS = ['فطور','غداء','عشاء','حلويات','مقبلات','مشروبات','سلطات','أخرى'];

let recipes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let categories = JSON.parse(localStorage.getItem(CATS_KEY) || 'null') || [...DEFAULT_CATS];
let pendingImage = null;
let selectMode = false;
let selectedIds = new Set();

function saveRecipes(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes)); }
function saveCategories(){ localStorage.setItem(CATS_KEY, JSON.stringify(categories)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(str){ const d=document.createElement('div'); d.innerText = str ?? ''; return d.innerHTML; }

// ---- migration for legacy string-based recipes ----
function migrateRecipe(r){
  if(typeof r.ingredients === 'string'){
    r.ingredients = r.ingredients.split('\n').filter(Boolean).map(line=>({name:line.trim(), qty:'', unit:''}));
  }
  if(!Array.isArray(r.ingredients)) r.ingredients = [];
  if(typeof r.method === 'string'){
    const steps = r.method.split('\n').filter(Boolean);
    r.methodGroups = steps.length ? [{title:'طريقة الإعداد', steps}] : [];
    delete r.method;
  }
  if(!Array.isArray(r.methodGroups)) r.methodGroups = r.methodGroups || [];
  return r;
}
recipes = recipes.map(migrateRecipe);

// ---- image compression ----
function compressImage(file, maxW=520, quality=0.72){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
document.getElementById('fImage').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  pendingImage = await compressImage(file);
  const preview = document.getElementById('imgPreview');
  preview.src = pendingImage;
  preview.style.display = 'block';
});

// ---- categories ----
function populateCategorySelects(){
  const filter = document.getElementById('categoryFilter');
  const currentFilterVal = filter.value;
  filter.innerHTML = '<option value="">جميع الأصناف</option>' + categories.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  filter.value = categories.includes(currentFilterVal) ? currentFilterVal : '';

  const formSelect = document.getElementById('fCategory');
  const currentFormVal = formSelect.value;
  formSelect.innerHTML = categories.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if(categories.includes(currentFormVal)) formSelect.value = currentFormVal;
}
document.getElementById('addCatBtn').addEventListener('click', ()=>{
  const name = prompt('اسم التصنيف الجديد:');
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  if(!categories.includes(trimmed)){
    categories.push(trimmed);
    saveCategories();
  }
  populateCategorySelects();
  document.getElementById('fCategory').value = trimmed;
});

// ---- ingredients table (form) ----
function addIngredientRow(data={name:'',qty:'',unit:UNITS[0]}){
  const wrap = document.getElementById('ingredientsBody');
  const row = document.createElement('div');
  row.className = 'ing-row';
  row.innerHTML = `
    <input type="text" class="ing-name" placeholder="مثال: طحين" value="${escapeHtml(data.name)}">
    <input type="number" class="ing-qty" placeholder="1" min="0" step="0.25" value="${escapeHtml(data.qty)}">
    <select class="ing-unit">${UNITS.map(u=>`<option value="${u}" ${u===data.unit?'selected':''}>${u}</option>`).join('')}</select>
    <button type="button" class="remove-x">✕</button>
  `;
  row.querySelector('.remove-x').addEventListener('click', ()=>row.remove());
  wrap.appendChild(row);
}
document.getElementById('addIngBtn').addEventListener('click', ()=>addIngredientRow());

// ---- method groups (form) ----
function addMethodGroup(data={title:'',steps:['']}){
  const wrap = document.getElementById('methodGroups');
  const group = document.createElement('div');
  group.className = 'method-group';
  group.innerHTML = `
    <div class="method-group-head">
      <input type="text" class="group-title" placeholder="اسم المرحلة، مثال: تجهيز المكوّنات الجافة" value="${escapeHtml(data.title)}">
      <button type="button" class="remove-x" title="حذف المرحلة">✕</button>
    </div>
    <div class="steps-list"></div>
    <button type="button" class="btn btn-ghost btn-small add-step-btn">＋ إضافة خطوة</button>
  `;
  group.querySelector('.method-group-head .remove-x').addEventListener('click', ()=>group.remove());
  const stepsList = group.querySelector('.steps-list');
  function addStep(text=''){
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `<span class="step-num"></span><input type="text" class="step-text" placeholder="اكتبي الخطوة..." value="${escapeHtml(text)}"><button type="button" class="remove-x">✕</button>`;
    row.querySelector('.remove-x').addEventListener('click', ()=>{ row.remove(); renumberSteps(stepsList); });
    stepsList.appendChild(row);
    renumberSteps(stepsList);
  }
  group.querySelector('.add-step-btn').addEventListener('click', ()=>addStep(''));
  (data.steps.length ? data.steps : ['']).forEach(s=>addStep(s));
  wrap.appendChild(group);
}
function renumberSteps(stepsList){
  stepsList.querySelectorAll('.step-row').forEach((row,i)=>{
    row.querySelector('.step-num').textContent = i+1;
  });
}
document.getElementById('addGroupBtn').addEventListener('click', ()=>addMethodGroup());

// ---- collecting form data ----
function collectIngredients(){
  return [...document.querySelectorAll('#ingredientsBody .ing-row')].map(row=>({
    name: row.querySelector('.ing-name').value.trim(),
    qty: row.querySelector('.ing-qty').value.trim(),
    unit: row.querySelector('.ing-unit').value
  })).filter(i=>i.name);
}
function collectMethodGroups(){
  return [...document.querySelectorAll('#methodGroups .method-group')].map(group=>({
    title: group.querySelector('.group-title').value.trim() || 'مرحلة',
    steps: [...group.querySelectorAll('.step-text')].map(s=>s.value.trim()).filter(Boolean)
  })).filter(g=>g.steps.length);
}

// ---- selection mode ----
function updateBulkBar(){
  document.getElementById('selCount').textContent = selectedIds.size;
}
document.getElementById('selectModeBtn').addEventListener('click', ()=>{
  selectMode = true;
  selectedIds.clear();
  document.getElementById('grid').classList.add('selecting');
  document.getElementById('bulkActions').style.display = 'flex';
  document.getElementById('selectModeBtn').style.display = 'none';
  updateBulkBar();
  render();
});
document.getElementById('cancelSelectBtn').addEventListener('click', ()=>{
  selectMode = false;
  selectedIds.clear();
  document.getElementById('grid').classList.remove('selecting');
  document.getElementById('bulkActions').style.display = 'none';
  document.getElementById('selectModeBtn').style.display = 'inline-block';
  render();
});
document.getElementById('deleteSelectedBtn').addEventListener('click', ()=>{
  if(selectedIds.size === 0) return;
  if(confirm('هل أنتِ متأكدة من حذف الوصفات المحدّدة وعددها ' + selectedIds.size + '؟')){
    recipes = recipes.filter(r=>!selectedIds.has(r.id));
    saveRecipes();
    selectedIds.clear();
    updateBulkBar();
    render();
  }
});

// ---- render recipe grid ----
function render(){
  populateCategorySelects();
  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const favOnly = document.getElementById('favFilter').value === 'fav';

  let list = recipes.filter(r=>{
    if(cat && r.category !== cat) return false;
    if(favOnly && !r.favorite) return false;
    if(search){
      const ingText = (r.ingredients||[]).map(i=>i.name).join(' ');
      const hay = (r.name + ' ' + ingText + ' ' + (r.category||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  list.sort((a,b)=>{
    if(!!b.favorite - !!a.favorite !== 0) return !!b.favorite - !!a.favorite;
    return (b.createdAt||0) - (a.createdAt||0);
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';

  if(list.length === 0){ empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.forEach(r=>{
    const card = document.createElement('div');
    card.className = 'card' + (selectedIds.has(r.id) ? ' checked' : '');
    card.innerHTML = `
      <div class="card-top"></div>
      <div class="card-fav ${r.favorite?'active':''}" data-id="${r.id}">${r.favorite?'★':'☆'}</div>
      <input type="checkbox" class="card-check" data-id="${r.id}" ${selectedIds.has(r.id)?'checked':''}>
      ${r.image ? `<img class="card-img" src="${r.image}">` : `<div class="card-img-placeholder">🍽️</div>`}
      <div class="card-body">
        ${r.category ? `<span class="card-tag">${escapeHtml(r.category)}</span>` : ''}
        <h3>${escapeHtml(r.name)}</h3>
        <div class="card-actions">
          <button class="btn btn-ghost btn-small" data-view="${r.id}">عرض</button>
          <button class="btn btn-ghost btn-small" data-edit="${r.id}">تعديل</button>
          <button class="btn btn-danger btn-small" data-del="${r.id}">حذف</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.getElementById('grid').addEventListener('click', (e)=>{
  const checkbox = e.target.closest('.card-check');
  if(checkbox){
    const id = checkbox.dataset.id;
    if(checkbox.checked) selectedIds.add(id); else selectedIds.delete(id);
    updateBulkBar();
    checkbox.closest('.card').classList.toggle('checked', checkbox.checked);
    return;
  }
  const favBtn = e.target.closest('.card-fav');
  if(favBtn){
    const r = recipes.find(x=>x.id===favBtn.dataset.id);
    r.favorite = !r.favorite;
    saveRecipes(); render();
    return;
  }
  if(e.target.dataset.view){ openView(e.target.dataset.view); return; }
  if(e.target.dataset.edit){ openForm(e.target.dataset.edit); return; }
  if(e.target.dataset.del){
    if(confirm('هل أنتِ متأكدة من حذف هذه الوصفة؟')){
      recipes = recipes.filter(r=>r.id!==e.target.dataset.del);
      saveRecipes(); render();
    }
  }
});
document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('categoryFilter').addEventListener('change', render);
document.getElementById('favFilter').addEventListener('change', render);

// ---- form open/close ----
const formOverlay = document.getElementById('formOverlay');
function resetFormDynamicParts(){
  document.getElementById('ingredientsBody').innerHTML = '';
  document.getElementById('methodGroups').innerHTML = '';
}
function openForm(id){
  pendingImage = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('fImage').value = '';
  populateCategorySelects();
  resetFormDynamicParts();

  if(id){
    const r = recipes.find(x=>x.id===id);
    document.getElementById('formTitle').textContent = 'تعديل الوصفة';
    document.getElementById('editId').value = r.id;
    document.getElementById('fName').value = r.name;
    if(r.category){
      if(!categories.includes(r.category)){ categories.push(r.category); saveCategories(); populateCategorySelects(); }
      document.getElementById('fCategory').value = r.category;
    }
    document.getElementById('fLink').value = r.link || '';
    if(r.image){
      pendingImage = r.image;
      const preview = document.getElementById('imgPreview');
      preview.src = r.image;
      preview.style.display = 'block';
    }
    (r.ingredients && r.ingredients.length ? r.ingredients : [{name:'',qty:'',unit:UNITS[0]}]).forEach(addIngredientRow);
    (r.methodGroups && r.methodGroups.length ? r.methodGroups : [{title:'',steps:['']}]).forEach(addMethodGroup);
  } else {
    document.getElementById('formTitle').textContent = 'وصفة جديدة';
    document.getElementById('editId').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fLink').value = '';
    addIngredientRow();
    addMethodGroup();
  }
  formOverlay.classList.add('open');
}
document.getElementById('addBtn').addEventListener('click', ()=>openForm(null));
document.getElementById('cancelBtn').addEventListener('click', ()=>formOverlay.classList.remove('open'));
formOverlay.addEventListener('click', (e)=>{ if(e.target===formOverlay) formOverlay.classList.remove('open'); });

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const name = document.getElementById('fName').value.trim();
  if(!name){ alert('يجب إدخال اسم الوصفة'); return; }
  const id = document.getElementById('editId').value;
  const data = {
    name,
    category: document.getElementById('fCategory').value,
    ingredients: collectIngredients(),
    methodGroups: collectMethodGroups(),
    link: document.getElementById('fLink').value.trim(),
    image: pendingImage
  };
  if(id){
    const r = recipes.find(x=>x.id===id);
    Object.assign(r, data);
  } else {
    recipes.push({ id: uid(), createdAt: Date.now(), favorite:false, ...data });
  }
  try{ saveRecipes(); }
  catch(err){
    alert('حدثت مشكلة أثناء الحفظ، من المحتمل أن مساحة التخزين المتوفرة في المتصفح أصبحت غير كافية. يُرجى حذف بعض الصور من وصفات سابقة والمحاولة مجدداً.');
    return;
  }
  formOverlay.classList.remove('open');
  render();
});

// ---- view modal ----
const viewOverlay = document.getElementById('viewOverlay');
function openView(id){
  const r = recipes.find(x=>x.id===id);
  const ingRows = (r.ingredients||[]).map(i=>`<tr><td>${escapeHtml(i.name)}</td><td>${escapeHtml(i.qty)} ${escapeHtml(i.unit||'')}</td></tr>`).join('');
  const groupsHtml = (r.methodGroups||[]).map(g=>`
    <div class="view-group-title">${escapeHtml(g.title)}</div>
    <ol class="view-steps">${g.steps.map(s=>`<li>${escapeHtml(s)}</li>`).join('')}</ol>
  `).join('');

  document.getElementById('viewModalBody').innerHTML = `
    ${r.image ? `<img src="${r.image}" style="width:100%;border-radius:14px;margin-bottom:14px;object-fit:cover;max-height:220px;">` : ''}
    <h2>${escapeHtml(r.name)}</h2>
    ${r.category ? `<span class="card-tag">${escapeHtml(r.category)}</span>` : ''}
    <div class="view-section" style="margin-top:14px;">
      <h4>المكوّنات</h4>
      <table class="view-table">${ingRows || '<tr><td>لا توجد مكوّنات مسجّلة</td></tr>'}</table>
    </div>
    <div class="view-section">
      <h4>طريقة الإعداد</h4>
      ${groupsHtml || '<div class="view-body">لا توجد خطوات مسجّلة</div>'}
    </div>
    ${r.link ? `<a class="link-line" href="${r.link}" target="_blank">🔗 فتح الرابط</a>` : ''}
    <div class="modal-actions">
      <button class="btn btn-ghost" id="closeViewBtn">إغلاق</button>
    </div>
  `;
  viewOverlay.classList.add('open');
  document.getElementById('closeViewBtn').addEventListener('click', ()=>viewOverlay.classList.remove('open'));
}
viewOverlay.addEventListener('click', (e)=>{ if(e.target===viewOverlay) viewOverlay.classList.remove('open'); });

// ---- export / import ----
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const payload = { recipes, categories };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'وصفاتي_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      const importedRecipes = Array.isArray(parsed) ? parsed : (parsed.recipes || []);
      const importedCats = Array.isArray(parsed) ? [] : (parsed.categories || []);
      const existingIds = new Set(recipes.map(r=>r.id));
      let added = 0;
      importedRecipes.forEach(r=>{
        if(r && r.name){
          if(!r.id || existingIds.has(r.id)) r.id = uid();
          recipes.push(migrateRecipe(r));
          added++;
        }
      });
      importedCats.forEach(c=>{ if(c && !categories.includes(c)) categories.push(c); });
      saveRecipes(); saveCategories(); render();
      alert('تم استيراد ' + added + ' وصفة بنجاح');
    }catch(err){
      alert('تنسيق الملف غير صحيح، يُرجى التأكد من الملف المُستورَد');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

render();
</script>
</body>
